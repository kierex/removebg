<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Account Creator API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            background: #f7f7f7;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .result pre {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status {
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .accounts-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .account-item {
            background: #f7f7f7;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .account-item strong {
            color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .badge.success {
            background: #28a745;
            color: white;
        }

        .badge.warning {
            background: #ffc107;
            color: #333;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .stat-card {
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Facebook Account Creator API</h1>
            <p>Automated account creation with anti-detection measures</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalAccounts">0</div>
                <div class="stat-label">Total Accounts</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="apiStatus">🟢</div>
                <div class="stat-label">API Status</div>
            </div>
        </div>

        <div class="grid">
            <!-- Single Account Creation -->
            <div class="card">
                <h2>📝 Create Single Account</h2>
                <button onclick="createSingleAccount()" id="singleBtn">
                    Create Account
                </button>
                <div id="singleResult"></div>
            </div>

            <!-- Multiple Accounts Creation -->
            <div class="card">
                <h2>👥 Create Multiple Accounts</h2>
                <div class="form-group">
                    <label>Number of Accounts (max 10):</label>
                    <input type="number" id="accountCount" min="1" max="10" value="1">
                </div>
                <div class="form-group">
                    <label>Delay between accounts (ms):</label>
                    <input type="number" id="delayTime" min="0" max="5000" value="2000">
                </div>
                <button onclick="createMultipleAccounts()" id="multipleBtn">
                    Create Accounts
                </button>
                <div id="multipleResult"></div>
            </div>

            <!-- Accounts List -->
            <div class="card">
                <h2>📋 Created Accounts</h2>
                <button onclick="fetchAccounts()" style="margin-bottom: 15px;">
                    Refresh List
                </button>
                <div id="accountsList" class="accounts-list">
                    <p style="color: #999; text-align: center;">Click refresh to load accounts</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Check API health on load
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();
                document.getElementById('apiStatus').innerHTML = '🟢';
                document.getElementById('apiStatus').title = 'API is running';
            } catch (error) {
                document.getElementById('apiStatus').innerHTML = '🔴';
                document.getElementById('apiStatus').title = 'API is offline';
            }
        }

        // Fetch all accounts
        async function fetchAccounts() {
            try {
                const response = await fetch(`${API_BASE}/api/accounts`);
                const data = await response.json();
                
                document.getElementById('totalAccounts').textContent = data.count || 0;
                
                const accountsList = document.getElementById('accountsList');
                
                if (data.data && data.data.length > 0) {
                    accountsList.innerHTML = data.data.map(acc => `
                        <div class="account-item">
                            <strong>${acc.name || 'Unknown'}</strong><br>
                            📧 ${acc.contact || 'N/A'}<br>
                            🆔 UID: ${acc.uid || 'N/A'}<br>
                            🔑 Pass: ${acc.password || 'N/A'}<br>
                            <small style="color: #999;">Cookies: ${acc.cookies ? '✅' : '❌'}</small>
                        </div>
                    `).join('');
                } else {
                    accountsList.innerHTML = '<p style="color: #999; text-align: center;">No accounts created yet</p>';
                }
            } catch (error) {
                console.error('Error fetching accounts:', error);
                document.getElementById('accountsList').innerHTML = `
                    <div class="status error">
                        ❌ Error loading accounts: ${error.message}
                    </div>
                `;
            }
        }

        // Create single account
        async function createSingleAccount() {
            const btn = document.getElementById('singleBtn');
            const resultDiv = document.getElementById('singleResult');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Creating...';
            resultDiv.innerHTML = '<div class="status info">⏳ Creating account, please wait...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.success && data.data.status === 'ok') {
                    resultDiv.innerHTML = `
                        <div class="status success">
                            ✅ Account created successfully!<br><br>
                            <strong>👤 Name:</strong> ${data.data.name}<br>
                            <strong>🆔 UID:</strong> ${data.data.uid}<br>
                            <strong>🔑 Password:</strong> ${data.data.password}<br>
                            <strong>📱 Contact:</strong> ${data.data.contact}<br>
                            <strong>🎂 DOB:</strong> ${data.data.dob}
                        </div>
                    `;
                    fetchAccounts(); // Refresh the accounts list
                } else if (data.data.status === 'checkpoint') {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            ⚠️ Account requires checkpoint verification<br>
                            Contact: ${data.data.contact}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="status error">
                            ❌ Creation failed<br>
                            Contact: ${data.data.contact || 'N/A'}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        }

        // Create multiple accounts
        async function createMultipleAccounts() {
            const btn = document.getElementById('multipleBtn');
            const resultDiv = document.getElementById('multipleResult');
            const count = document.getElementById('accountCount').value;
            const delay = document.getElementById('delayTime').value;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Creating accounts...';
            resultDiv.innerHTML = '<div class="status info">⏳ Creating accounts, this may take a while...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/create-multiple`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: parseInt(count), delay: parseInt(delay) })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    let html = `<div class="status success">
                        ✅ Created ${data.data.success} out of ${data.data.total} accounts<br>
                        ⚠️ Checkpoints: ${data.data.checkpoint}<br>
                        ❌ Failed: ${data.data.failed}
                    </div>`;
                    
                    if (data.data.accounts.length > 0) {
                        html += `<div style="margin-top: 15px;"><strong>Successfully created:</strong><br>`;
                        data.data.accounts.forEach(acc => {
                            html += `👤 ${acc.name} (${acc.uid})<br>`;
                        });
                        html += `</div>`;
                    }
                    
                    resultDiv.innerHTML = html;
                    fetchAccounts(); // Refresh the accounts list
                } else {
                    resultDiv.innerHTML = `<div class="status error">❌ Creation failed</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Create Accounts';
            }
        }

        // Auto-refresh accounts every 30 seconds
        setInterval(() => {
            fetchAccounts();
        }, 30000);
        
        // Initial load
        checkHealth();
        fetchAccounts();
        
        // Health check every 10 seconds
        setInterval(checkHealth, 10000);
    </script>
</body>
</html>
