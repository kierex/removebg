<!-- dashboard.html - Fixed with video controls (play/pause, mute/unmute, volume, progress bar) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ShareBoost | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgb(0, 0, 0) 0%, #0a0a1a 100%);
            min-height: 100vh;
            padding: 40px 24px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, rgba(255,100,200,0.15), rgba(100,200,255,0.2), rgba(200,100,255,0.2), rgba(100,255,200,0.15));
            animation: iridescentShift 18s infinite linear;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes iridescentShift {
            0% { transform: rotate(0deg); opacity: 0.4; }
            50% { transform: rotate(180deg); opacity: 0.7; }
            100% { transform: rotate(360deg); opacity: 0.4; }
        }
        .wrapper-container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; }
        .glass-holo {
            background: rgba(12, 12, 25, 0.45);
            backdrop-filter: blur(14px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .container { padding: 28px 36px; margin-bottom: 28px; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 20px; flex-wrap: wrap; }
        .logo-icon { font-size: 58px; background: linear-gradient(135deg, #ffb3ff, #9effff, #c084fc); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h1 { font-size: 52px; font-weight: 800; background: linear-gradient(120deg, #FFFFFF, #f0b3ff, #b6eaff, #ffd6b3); background-size: 300% 300%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shimmerHolo 5s ease infinite; }
        @keyframes shimmerHolo { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        h1 span { font-weight: 500; background: linear-gradient(135deg, #ffd966, #ffb3ba, #a0e7ff); -webkit-background-clip: text; background-clip: text; }
        .tagline { text-align: center; color: rgba(230, 220, 255, 0.85); margin-bottom: 28px; font-size: 1rem; }
        .badge-container { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
        .badge { background: rgba(20, 20, 50, 0.6); backdrop-filter: blur(8px); padding: 8px 20px; border-radius: 40px; font-size: 13px; font-weight: 500; color: #fff0f5; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255, 200, 255, 0.4); }
        .form-wrapper { padding: 38px 38px; margin-bottom: 28px; }
        .form-wrapper h2 { font-size: 32px; background: linear-gradient(135deg, #fff, #cfb3ff); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; }
        .form-description { color: rgba(210, 200, 250, 0.8); margin-bottom: 28px; font-size: 0.9rem; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: flex; align-items: center; gap: 10px; color: #f0eaff; font-weight: 500; margin-bottom: 10px; }
        .tooltip { position: relative; cursor: help; color: #c5b3ff; }
        .tooltip:hover::before { content: attr(data-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #0b0b1f; color: #ffecb3; padding: 6px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap; z-index: 20; border: 1px solid rgba(255, 200, 255, 0.6); backdrop-filter: blur(10px); }
        input, textarea { width: 100%; padding: 14px 18px; background: rgba(10, 10, 25, 0.8); border: 1px solid rgba(160, 130, 255, 0.5); border-radius: 24px; font-size: 14px; font-family: 'Inter', monospace; color: #f3eefc; }
        input:focus, textarea:focus { outline: none; border-color: #ff86e0; box-shadow: 0 0 0 3px rgba(200, 100, 255, 0.3); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .input-with-icon { position: relative; }
        .input-hint { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 11px; color: #bca9ff; background: rgba(0,0,0,0.3); padding: 2px 10px; border-radius: 40px; pointer-events: none; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(100deg, #7248ff, #c55aff, #ff6eb4); background-size: 200% 200%; border: none; border-radius: 40px; font-size: 18px; font-weight: 700; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.3s; margin-top: 18px; box-shadow: 0 8px 20px rgba(100, 0, 255, 0.4); }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 18px 35px rgba(150, 50, 255, 0.5); background-position: 100% 100%; }
        .result-message { margin-top: 20px; padding: 14px; border-radius: 60px; text-align: center; font-weight: 600; display: none; animation: fadeSlide 0.3s ease; }
        .result-message.success { background: rgba(0, 255, 180, 0.18); border: 1px solid #2effb0; color: #c5ffdf; display: block; }
        .result-message.error { background: rgba(255, 70, 130, 0.2); border: 1px solid #ff6e8b; color: #ffbcbc; display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Video Player with Controls */
        .tiktok-section {
            margin-bottom: 28px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
        .video-container {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 16px;
            border: 3px solid transparent;
            border-image: linear-gradient(135deg, #ff6ec7, #7873f5, #3bc9db);
            border-image-slice: 1;
            box-shadow: 0 0 25px rgba(120, 115, 245, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 16px;
            position: relative;
        }
        .video-container:hover {
            transform: scale(1.01);
            box-shadow: 0 0 35px rgba(255, 110, 199, 0.5);
            border-image: linear-gradient(135deg, #ffb347, #ff6ec7, #7873f5);
            border-image-slice: 1;
        }
        .video-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
        }
        .tiktok-video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            cursor: pointer;
        }
        
        /* Custom Controls Overlay */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.4), transparent);
            padding: 12px 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .video-wrapper:hover .video-controls {
            opacity: 1;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .control-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
        }
        .control-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }
        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6ec7, #7873f5);
            border-radius: 5px;
            width: 0%;
            position: relative;
        }
        .time-display {
            color: white;
            font-size: 12px;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 20px;
        }
        .volume-slider {
            width: 60px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff86e0;
            cursor: pointer;
        }
        
        .next-video-btn {
            background: linear-gradient(135deg, #7248ff, #c55aff);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(114, 72, 255, 0.4);
        }
        .next-video-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(197, 90, 255, 0.5);
        }
        
        .nav-links { display: flex; gap: 20px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .nav-link { color: #c5b3ff; text-decoration: none; padding: 8px 20px; border-radius: 30px; background: rgba(255,255,255,0.1); transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.2); color: white; }
        
        @media (max-width: 760px) { 
            .form-row { grid-template-columns: 1fr; gap: 12px; } 
            .container, .form-wrapper { padding: 24px; } 
            h1 { font-size: 38px; }
            .video-container { padding: 10px; }
            .controls-row { gap: 8px; }
            .control-btn { width: 30px; height: 30px; font-size: 12px; }
            .volume-slider { width: 40px; }
        }
    </style>
</head>
<body>
<div class="wrapper-container">
    <div class="container glass-holo">
        <div class="logo-container">
            <i class="fas fa-share-alt logo-icon"></i>
            <h1>SHARE<span>BOOSTER</span></h1>
        </div>
        <p class="tagline">Holographic Iridescent Engine • Automated Facebook Post Distribution</p>
        <div class="badge-container">
            <span class="badge"><i class="fas fa-bolt"></i> Quantum Speed</span>
            <span class="badge"><i class="fas fa-shield-alt"></i> Encrypted</span>
            <span class="badge"><i class="fas fa-chart-line"></i> Live Metrics</span>
        </div>
    </div>

    <!-- TikTok Video Section with Custom Controls -->
    <div class="tiktok-section">
        <div class="video-container">
            <div class="video-wrapper">
                <video id="tiktokVideoPlayer" class="tiktok-video" preload="metadata">
                    <source src="" type="video/mp4">
                </video>
                <div class="video-controls">
                    <div class="controls-row">
                        <button class="control-btn" id="playPauseBtn">
                            <i class="fas fa-play"></i>
                        </button>
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                        </div>
                        <button class="control-btn" id="muteBtn">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                    </div>
                </div>
            </div>
        </div>
        <button class="next-video-btn" id="nextVideoBtn">
            <i class="fas fa-forward"></i> Next Video
        </button>
    </div>

    <div class="form-wrapper glass-holo">
        <h2><i class="fas fa-rocket"></i> Ignite Campaign</h2>
        <p class="form-description">Inject cookie credentials & target URL — premium booster engine (Delay fixed at 2s)</p>
        <form onsubmit="submitForm(event)" class="form-container">
            <div class="form-group">
                <label><i class="fas fa-key"></i> Facebook Cookie Array 
                    <span class="tooltip" data-tooltip="Paste full cookie JSON array"><i class="fas fa-info-circle"></i></span>
                </label>
                <textarea id="cookies" placeholder='[{"key":"sb","value":"xxx"},{"key":"datr","value":"xxx"}]' rows="3"></textarea>
            </div>
            <div class="form-group">
                <label><i class="fas fa-link"></i> Post URL</label>
                <input type="text" id="urls" placeholder="https://www.facebook.com/...">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-chart-simple"></i> Share Limit</label>
                    <div class="input-with-icon">
                        <input type="number" id="amounts" min="1" max="10000" placeholder="250">
                        <span class="input-hint">max 10k</span>
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> Delay (sec)</label>
                    <div class="input-with-icon">
                        <input type="number" id="intervals" value="2" readonly disabled style="background:#1e1e3a; cursor:not-allowed;">
                        <span class="input-hint">fixed 2 sec</span>
                    </div>
                </div>
            </div>
            <button type="submit" id="submit-button" class="submit-btn"><i class="fas fa-play"></i> <span>Execute Iridescent Boost</span></button>
            <div id="result" class="result-message"></div>
        </form>
    </div>

    <div class="nav-links">
        <a href="/logs.html" class="nav-link"><i class="fas fa-scroll"></i> Live Logs</a>
        <a href="/api-docs.html" class="nav-link"><i class="fas fa-code"></i> API Docs</a>
        <a href="/tutorial.html" class="nav-link"><i class="fas fa-book-open"></i> Tutorial</a>
    </div>
</div>

<script>
    // Video player elements
    const video = document.getElementById('tiktokVideoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const timeDisplay = document.getElementById('timeDisplay');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const nextVideoBtn = document.getElementById('nextVideoBtn');
    
    let isDraggingProgress = false;
    
    // Format time (seconds to MM:SS)
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }
    
    // Update progress bar and time display
    function updateProgress() {
        if (!isDraggingProgress && video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = `${percent}%`;
            timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        }
    }
    
    // Update play/pause button icon
    function updatePlayPauseIcon() {
        if (video.paused) {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        } else {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }
    }
    
    // Play/Pause
    function togglePlayPause() {
        if (video.paused) {
            video.play().catch(e => console.log('Play failed:', e));
        } else {
            video.pause();
        }
        updatePlayPauseIcon();
    }
    
    // Seek to position
    function seekTo(e) {
        const rect = progressBar.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        if (video.duration) {
            video.currentTime = pos * video.duration;
        }
    }
    
    // Mute/Unmute
    function toggleMute() {
        video.muted = !video.muted;
        muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        volumeSlider.value = video.muted ? 0 : (video.volume || 1);
    }
    
    // Update volume
    function updateVolume() {
        video.volume = parseFloat(volumeSlider.value);
        video.muted = false;
        muteBtn.innerHTML = video.volume === 0 ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        if (video.volume === 0) {
            video.muted = true;
        }
    }
    
    // Load new video
    async function loadTikTokVideo() {
        const currentSrc = video.querySelector('source').src;
        
        try {
            const response = await fetch('/api/tiktok/random');
            const data = await response.json();
            if (data.success && data.video && data.video.url) {
                // Store current playback state
                const wasPlaying = !video.paused;
                
                // Load new video
                video.querySelector('source').src = data.video.url;
                video.load();
                
                // Wait for metadata to load
                video.addEventListener('loadedmetadata', () => {
                    if (wasPlaying) {
                        video.play().catch(e => console.log('autoplay blocked', e));
                    }
                    updatePlayPauseIcon();
                }, { once: true });
            }
        } catch (err) {
            console.error('TikTok fetch error:', err);
        }
    }
    
    // Event listeners
    playPauseBtn.addEventListener('click', togglePlayPause);
    video.addEventListener('click', togglePlayPause);
    video.addEventListener('play', updatePlayPauseIcon);
    video.addEventListener('pause', updatePlayPauseIcon);
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', () => {
        timeDisplay.textContent = `0:00 / ${formatTime(video.duration)}`;
        progressFill.style.width = '0%';
    });
    
    // Progress bar seeking
    progressBar.addEventListener('mousedown', (e) => {
        isDraggingProgress = true;
        seekTo(e);
    });
    window.addEventListener('mousemove', (e) => {
        if (isDraggingProgress) {
            seekTo(e);
        }
    });
    window.addEventListener('mouseup', () => {
        isDraggingProgress = false;
    });
    
    // Mute and volume
    muteBtn.addEventListener('click', toggleMute);
    volumeSlider.addEventListener('input', updateVolume);
    
    // Next video
    nextVideoBtn.addEventListener('click', () => {
        loadTikTokVideo();
    });
    
    // Auto-refresh video every 50 seconds (but only if not playing)
    setInterval(() => {
        if (video.paused) {
            loadTikTokVideo();
        }
    }, 50000);
    
    // Submit form function
    async function submitForm(event) {
        event.preventDefault();
        const resultDiv = document.getElementById('result');
        const button = document.getElementById('submit-button');
        const cookies = document.getElementById('cookies').value.trim();
        const url = document.getElementById('urls').value.trim();
        const amount = document.getElementById('amounts').value;
        
        if (!cookies || !url || !amount) {
            showResult('⛔ All fields required', 'error');
            return;
        }
        try {
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Launching Engine...';
            const response = await fetch('/api/submit', {
                method: 'POST',
                body: JSON.stringify({ cookie: cookies, url: url, amount: parseInt(amount), interval: 2 }),
                headers: { 'Content-Type': 'application/json' },
            });
            const data = await response.json();
            if (data.success || data.status === 200) {
                showResult('✓ Session activated! (2s delay enforced)', 'success');
                document.getElementById('cookies').value = '';
                document.getElementById('urls').value = '';
                document.getElementById('amounts').value = '';
            } else {
                showResult('⚠️ Error: ' + (data.error || 'unknown failure'), 'error');
            }
        } catch (e) {
            showResult('❌ Network error: ' + e.message, 'error');
        } finally {
            button.disabled = false;
            button.innerHTML = '<i class="fas fa-play"></i> <span>Execute Iridescent Boost</span>';
        }
    }
    
    function showResult(message, type) {
        const resultEl = document.getElementById('result');
        resultEl.textContent = message;
        resultEl.className = `result-message ${type}`;
        resultEl.style.display = 'block';
        setTimeout(() => { resultEl.className = 'result-message'; resultEl.style.display = 'none'; }, 4800);
    }
    
    // Initial video load
    loadTikTokVideo();
    
    // Enable autoplay with sound (respect user interaction)
    document.body.addEventListener('click', () => {
        if (video.paused && video.readyState >= 2) {
            video.play().catch(e => console.log('autoplay on click blocked', e));
        }
    }, { once: true });
</script>
</body>
</html>
