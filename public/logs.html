<!-- logs.html - ALL STATS HERE (Total Shares, Active Sessions, Completed) + session logs -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ShareBoost | Live Session Logs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgb(0, 0, 0) 0%, #0a0a1a 100%);
            min-height: 100vh;
            padding: 40px 24px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, rgba(255,100,200,0.15), rgba(100,200,255,0.2), rgba(200,100,255,0.2), rgba(100,255,200,0.15));
            animation: iridescentShift 18s infinite linear;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes iridescentShift { 0% { transform: rotate(0deg); opacity: 0.4; } 50% { transform: rotate(180deg); opacity: 0.7; } 100% { transform: rotate(360deg); opacity: 0.4; } }
        .wrapper-container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; }
        .glass-holo {
            background: rgba(12, 12, 25, 0.45);
            backdrop-filter: blur(14px) saturate(180%);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .header-card { padding: 28px 36px; margin-bottom: 28px; text-align: center; }
        .logo-icon { font-size: 48px; background: linear-gradient(135deg, #ffb3ff, #9effff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        h1 { font-size: 44px; font-weight: 800; background: linear-gradient(120deg, #FFFFFF, #f0b3ff, #b6eaff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        /* Stats cards - THESE ARE THE TOTAL SHARE, ACTIVE, COMPLETED */
        .session-stats-row {
            display: flex;
            gap: 24px;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        .stat-pill {
            flex: 1;
            background: rgba(20, 20, 50, 0.6);
            backdrop-filter: blur(8px);
            padding: 24px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 200, 255, 0.3);
            transition: all 0.3s;
        }
        .stat-pill:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 150, 255, 0.6);
        }
        .stat-pill h3 { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #fff, #ffd6b3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stat-pill p { color: #bcaeff; font-weight: 500; margin-top: 8px; letter-spacing: 1px; }
        .stat-icon-small { font-size: 32px; margin-bottom: 8px; color: #c8aaff; }
        
        .logs-container { padding: 24px; margin-top: 10px; }
        .session-card {
            background: rgba(10, 10, 28, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 150, 220, 0.4);
            overflow: hidden;
            transition: 0.2s;
        }
        .session-header {
            padding: 20px 24px;
            background: rgba(25, 20, 55, 0.7);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .session-id { font-weight: 700; color: #dbbaff; font-family: monospace; font-size: 13px; }
        .session-status {
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-running { background: #2a6f8f30; color: #8dd0ff; border: 1px solid #3aa8ff; }
        .status-completed { background: #1f7a5530; color: #7affb9; border: 1px solid #32ff9e; }
        .stat-badge { background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 30px; font-size: 13px; }
        .log-details {
            padding: 16px 24px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-details.open { display: block; }
        .log-entry {
            font-size: 12px;
            font-family: monospace;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,200,255,0.1);
            color: #cdc9ff;
        }
        .log-time { color: #9f8eff; margin-right: 12px; }
        .nav-back { margin-top: 30px; text-align: center; }
        .nav-link { color: #c5b3ff; text-decoration: none; padding: 10px 24px; border-radius: 40px; background: rgba(255,255,255,0.1); display: inline-block; margin: 0 8px; }
        @media (max-width: 700px) { .session-header { flex-direction: column; align-items: flex-start; } .stat-pill h3 { font-size: 28px; } }
    </style>
</head>
<body>
<div class="wrapper-container">
    <div class="header-card glass-holo">
        <i class="fas fa-scroll logo-icon"></i>
        <h1>Live Session Logs</h1>
        <p style="color:#b9adff; margin-top: 12px;">Real-time sharing activity & detailed session logs</p>
    </div>

    <!-- STATS CARDS: Total Shares, Active Sessions, Completed - ONLY HERE, NOT ON DASHBOARD -->
    <div class="session-stats-row">
        <div class="stat-pill glass-holo">
            <div class="stat-icon-small"><i class="fas fa-chart-line"></i></div>
            <h3 id="logs-total-shares">0</h3>
            <p>TOTAL SHARES</p>
        </div>
        <div class="stat-pill glass-holo">
            <div class="stat-icon-small"><i class="fas fa-users"></i></div>
            <h3 id="logs-active-sessions">0</h3>
            <p>ACTIVE SESSIONS</p>
        </div>
        <div class="stat-pill glass-holo">
            <div class="stat-icon-small"><i class="fas fa-check-circle"></i></div>
            <h3 id="logs-completed-sessions">0</h3>
            <p>COMPLETED</p>
        </div>
    </div>

    <div class="logs-container glass-holo" id="sessionsLogsContainer">
        <div style="padding: 20px; text-align: center; color: #aaa;" id="loadingLogsMsg">Loading sessions...</div>
        <div id="sessionLogsList"></div>
    </div>

    <div class="nav-back">
        <a href="/" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="/api-docs.html" class="nav-link"><i class="fas fa-code"></i> API Docs</a>
    </div>
</div>

<script>
    let activeRefresh = null;
    
    async function fetchSessionsAndLogs() {
        try {
            const res = await fetch('/api/sessions/summary');
            const data = await res.json();
            if (!data.success) throw new Error('summary fail');
            const sessions = data.sessions || [];
            const totals = data.totals || { totalShares: 0, activeSessions: 0, completedSessions: 0 };
            
            // Update stats cards
            document.getElementById('logs-total-shares').innerText = totals.totalShares;
            document.getElementById('logs-active-sessions').innerText = totals.activeSessions;
            document.getElementById('logs-completed-sessions').innerText = totals.completedSessions;
            
            const container = document.getElementById('sessionLogsList');
            if (sessions.length === 0) {
                container.innerHTML = '<div style="padding: 30px; text-align:center;">✨ No active or completed sessions ✨</div>';
                return;
            }
            container.innerHTML = '';
            for (const sess of sessions) {
                const sessionCard = document.createElement('div');
                sessionCard.className = 'session-card';
                const statusClass = sess.status === 'running' ? 'status-running' : 'status-completed';
                const statusText = sess.status === 'running' ? 'PROCESSING' : 'COMPLETED';
                sessionCard.innerHTML = `
                    <div class="session-header" data-sessionid="${sess.sessionId}">
                        <div>
                            <i class="fas fa-microchip"></i> 
                            <span class="session-id">${sess.sessionId.substring(0, 16)}...</span>
                            <div style="font-size:11px; color:#9a8acf; margin-top:4px;">${sess.url ? sess.url.substring(0, 55) : 'No URL'}</div>
                        </div>
                        <div style="display: flex; gap: 12px; align-items: center;">
                            <span class="stat-badge"><i class="fas fa-share-alt"></i> ${sess.sharedCount || 0}/${sess.targetAmount || 0}</span>
                            <span class="session-status ${statusClass}"><i class="fas ${sess.status === 'running' ? 'fa-sync-alt fa-spin' : 'fa-check-circle'}"></i> ${statusText}</span>
                        </div>
                        <div><i class="fas fa-chevron-down" style="cursor:pointer; color:#aa99ff;"></i></div>
                    </div>
                    <div class="log-details" id="logs-${sess.sessionId}">
                        <div style="padding: 8px;"><i class="fas fa-spinner fa-pulse"></i> Loading logs...</div>
                    </div>
                `;
                container.appendChild(sessionCard);
                
                const header = sessionCard.querySelector('.session-header');
                const logDiv = sessionCard.querySelector('.log-details');
                header.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const isOpen = logDiv.classList.contains('open');
                    if (!isOpen) {
                        logDiv.classList.add('open');
                        if (logDiv.innerHTML.includes('Loading logs...')) {
                            await loadSessionLogs(sess.sessionId, logDiv);
                        }
                    } else {
                        logDiv.classList.remove('open');
                    }
                });
            }
        } catch (err) { console.error(err); }
    }
    
    async function loadSessionLogs(sessionId, containerEl) {
        try {
            const res = await fetch(`/api/session/${sessionId}/logs`);
            const data = await res.json();
            if (data.success && data.logs) {
                const logs = data.logs;
                if (logs.length === 0) {
                    containerEl.innerHTML = '<div style="padding: 12px;">📭 No detailed logs yet.</div>';
                    return;
                }
                const logsHtml = logs.slice(-50).map(log => `
                    <div class="log-entry">
                        <span class="log-time">${new Date(log.timestamp).toLocaleTimeString()}</span>
                        <span><strong>${log.action}</strong></span>
                        <span style="color:#ba9eff;"> ${typeof log.data === 'object' ? JSON.stringify(log.data).substring(0, 100) : log.data}</span>
                    </div>
                `).join('');
                containerEl.innerHTML = `<div style="max-height:250px; overflow-y:auto;">${logsHtml}</div>`;
            } else {
                containerEl.innerHTML = '<div>Failed to load logs</div>';
            }
        } catch (err) {
            containerEl.innerHTML = '<div>Error fetching logs</div>';
        }
    }
    
    fetchSessionsAndLogs();
    if (activeRefresh) clearInterval(activeRefresh);
    activeRefresh = setInterval(fetchSessionsAndLogs, 3200);
</script>
</body>
</html>
